<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Verification</title><link rel="stylesheet" href="css/style.css"/></head><body><main class="app-shell"><section class="panel"><h2>Identity Verification</h2><p class="muted">Required before access.</p><form id="verificationForm" class="grid-2"><input name="legalName" placeholder="Full legal name" required/><input name="age" type="number" min="18" placeholder="Age" required/><input name="gender" placeholder="Gender" required/><input name="country" placeholder="Country" required/><input name="city" placeholder="City" required/><input name="phone" placeholder="Phone" required/><input name="email" type="email" placeholder="Email" required/><input name="social" placeholder="Social link (optional)"/><textarea name="bio" placeholder="Bio / interests"></textarea><input name="hobbies" placeholder="Hobbies, comma-separated"/><input name="idPhoto" placeholder="Cloudinary ID image URL" required/><input name="selfie" placeholder="Cloudinary selfie URL" required/><label>Google Meet availability<textarea name="availability" placeholder="Mon 6 PM, Fri 8 PM"></textarea></label><button class="btn btn-gold" type="submit">Submit verification</button></form><p id="verificationMessage" class="status-card"></p></section></main><script type="module" src="js/verification.js"></script></body></html>
